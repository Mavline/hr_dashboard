<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8">
  <title>Bus Delays Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <span class="app-title">Bus Delays Dashboard</span>
    <div class="spacer"></div>
    <button id="btn-refresh" class="secondary">Refresh</button>
    <button id="btn-file" class="secondary">Change file…</button>
    <button id="btn-export" class="primary">Export</button>
    <span class="path" id="path">—</span>
  </header>

  <section class="totals-strip" id="totals-strip"></section>

  <section class="controls">
    <label>Sort by
      <select id="sort-by">
        <option value="total_late">Total Late</option>
        <option value="cases">Cases</option>
        <option value="avg_late">Avg Late</option>
      </select>
    </label>
    <label>Employee
      <div class="emp-wrap">
        <input id="f-emp" type="search" placeholder="name / no">
        <div id="emp-suggest" class="suggest" hidden></div>
      </div>
    </label>
    <label>From <input id="f-from" type="date"></label>
    <label>To <input id="f-to" type="date"></label>
    <label class="clear-wrap">
      <span class="label-spacer">&nbsp;</span>
      <button id="btn-clear" class="secondary clear-btn">Clear</button>
    </label>
  </section>

  <div class="scroll-area" id="scroll-area">
    <div class="cards-grid" id="cards-grid"></div>

    <section class="emp-table-section">
      <h2 class="section-heading">Employees</h2>
      <div class="table-wrap">
        <table id="emp-table" class="emp-table">
          <thead>
            <tr>
              <th>Employee No</th>
              <th>Last Name</th>
              <th>First Name</th>
              <th>City</th>
              <th>Route</th>
              <th>Cases</th>
              <th>Total Late (min)</th>
            </tr>
          </thead>
          <tbody id="emp-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="mock.js"></script>
  <script src="ui.js"></script>
</body>
</html>
