<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8">
  <title>Bus Delays Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <span class="app-title">Bus Delays Dashboard</span>
    <div class="spacer"></div>
    <button id="btn-refresh" class="secondary">Refresh</button>
    <button id="btn-file" class="secondary">Change file…</button>
    <button id="btn-export" class="primary">Export</button>
    <span class="path" id="path">—</span>
  </header>

  <section class="totals-strip" id="totals-strip"></section>

  <section class="controls">
    <label>View by
      <select id="view">
        <option value="employee">Employee</option>
        <option value="route">Route</option>
        <option value="date">Date</option>
        <option value="week">Week</option>
        <option value="weekday">Weekday</option>
      </select>
    </label>
    <label>Sort by
      <select id="sort-by">
        <option value="total_late">Total Late</option>
        <option value="cases">Cases</option>
        <option value="avg_late">Avg Late</option>
      </select>
    </label>
    <label>Employee <input id="f-emp" type="search" placeholder="name / no"></label>
    <label>From <input id="f-from" type="date"></label>
    <label>To <input id="f-to" type="date"></label>
  </section>

  <div class="cards-grid" id="cards-grid"></div>

  <script src="mock.js"></script>
  <script src="ui.js"></script>
</body>
</html>
